# 简短描述（50字内）
short_description: "用户与大模型桥梁指导 - 心理学分析、意图识别、认知偏差、意识建模"

# 详细描述
description: |
  心镜（xinji）是用户与大模型的桥梁指导技能。
  
  如镜照心，洞察用户真实意图。

  核心能力：
  - 心理学分析：意图识别、情绪检测、需求分析、防御识别
  - 认知偏差处理：Kahneman双系统、16种偏差、EAST框架
  - 意识理论整合：GWT、IIT、SEP自我意识
  - 时间感知系统：急迫度算法、时间敌人框架
  - 真善美计算：熵减判断、心理健康分析

