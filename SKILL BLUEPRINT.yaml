  # ════════════════════════════════════════════════════════════════════════════════
  # 7. heal - 错误恢复
  # ════════════════════════════════════════════════════════════════════════════════
  - id: heal
    name: 错误恢复
    module: evolution.js (heal method)
    status: implemented

    trigger:
      auto:
        - "出错时"
        - "任务执行失败时"
        - "异常状态时"
      manual:
        - "用户说 'heal', 'recover'"

    # 错误模式定义
    patterns:
      timeout:
        keywords: ["timeout", "timed out", "ETIMEDOUT"]
        default_strategy: retry
      network:
        keywords: ["network", "ENOTFOUND", "ECONNREFUSED"]
        default_strategy: retry
      memory:
        keywords: ["memory", "heap", "out of memory"]
        default_strategy: fallback
      permission:
        keywords: ["permission", "EPERM", "EACCES"]
        default_strategy: abort
      syntax:
        keywords: ["syntax", "parse", "invalid"]
        default_strategy: retry
      reference:
        keywords: ["not found", "undefined", "null"]
        default_strategy: skip

    input:
      type: object
      required_params:
        - name: error
          type: object
          required: true
          description: "错误信息"
          properties:
            message: string
            code: string
            stack: string

    output:
      type: object
      fields:
        ok:
          type: boolean
          description: "是否可恢复"
        canRetry:
          type: boolean
          description: "是否可以重试"
        backoffMs:
          type: number
          description: "建议等待时间"
        strategy:
          type: string
          enum: [retry, fallback, skip, abort]
        pattern:
          type: string
          description: "检测到的错误模式"
        hints:
          type: array
          items: string
          description: "恢复提示"
        circuit_breaker:
          type: object
          description: "熔断器状态"

    implementation:
      q_table:
        learning_rate: 0.3
        exploration_rate: 0.1
        max_window: 20
      circuit_breaker:
        enabled: true
        failure_threshold: 5
        reset_timeout_ms: 60000

    current_state: "✅ 已实现 - Q-learning + 熔断器"

    upgrade_suggestions:
      - id: UP-HEAL-001
        title: "策略库扩展"
