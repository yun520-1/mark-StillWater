    # Bootstrap lessons (内置教训)
    bootstrap_lessons:
      - errorPattern: "收到理解类问题就搜索"
        correction: "理解类问题第一反应是自己思考"
        rootCause: "条件反射式搜索"
      - errorPattern: "版本号只更新一个文件"
        correction: "VERSION、package.json、SKILL.md 必须同时更新"
        rootCause: "只更新了 VERSION"
      - errorPattern: "隐私数据上传 GitHub"
        correction: "检查 .gitignore 后再上传"
        rootCause: "没有检查 .gitignore"

    input:
      type: object
      required_params:
        - name: task
          type: string
          required: true
          description: "任务描述"
          max_length: 200
        - name: outcome
          type: string
          required: true
          enum: [success, failure, partial]
          description: "任务结果"
      optional_params:
        - name: evidence
          type: string
          description: "证据/错误信息"
          max_length: 500
        - name: expected
          type: string
          description: "预期结果"
          max_length: 500

    output:
      type: object
      fields:
        outcome:
          type: string
        reflection:
          type: object
          properties:
            lesson: string
            corrections: array
            type: string
        lessonStored:
          type: boolean
        lessonKey:
          type: string
          nullable: true

    implementation:
      engine_class: HeartFlowEvolution
      pattern: "Reflexion 模式"
      q_learning:
        epsilon: 0.1
        alpha: 0.3
        strategies: [retry, fallback, skip, abort]
        backoff_ms: { retry: 1000, fallback: 5000, skip: 0, abort: 0 }

    security:
      input_validation: "sanitizeInput() 限制长度和内容"
      p1_fix: "evidence 长度限制 500 字符"

    current_state: "✅ 已实现 - Reflexion 模式 + Q-learning"

    upgrade_suggestions:
      - id: UP-EVOL-001
        title: "自动失败分析"
        description: "自动分析失败原因，生成改进策略"
        priority: high
