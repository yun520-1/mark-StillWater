        title: "更多模式"
        description: "增加数据库凭证、OAuth token 等"
        priority: medium
        status: proposed

      - id: UP-SEC-002
        title: "URL 验证"
        description: "检测潜在的 SSRF 风险"
        priority: high
        status: proposed

      - id: UP-SEC-003
        title: "文件扫描"
        description: "扫描文件名中的敏感信息"
        priority: low
        status: proposed

      - id: UP-SEC-004
        title: "敏感信息检测扩展"
        description: "扩展敏感信息检测和行为边界"
        priority: high
