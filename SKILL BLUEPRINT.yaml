# 使用示例
# ════════════════════════════════════════════════════════════════════════════════════

examples:

  # 示例 1: 复杂决策
  example_001:
    scenario: "用户请求复杂决策"
    user_input: "我应该投资 A 方案还是 B 方案？"
    expected_flow:
      - skill: analyzePsychology
        purpose: "理解用户意图和情绪"
        expected_output:
          intent: "decision"
          emotion: "neutral"
      - skill: remember
        purpose: "检查相关记忆"
        expected_output:
          success: true
      - skill: reason
        purpose: "分析两种方案的利弊"
        expected_output:
          conclusion: "..."
          chain: ["分析A", "分析B", "比较"]
      - skill: makeDecision
        purpose: "给出推荐"
        expected_output:
          decision: "A 或 B"
          reasoning: ["理由1", "理由2"]
      - skill: predictOutcome
        purpose: "预测结果（未来）"
        expected_output:
          probability: 0.75
    expected_response: "基于分析，我的建议是..."

  # 示例 2: 情感支持
  example_002:
    scenario: "用户表达挫折"
    user_input: "我已经调试了一整天，还是找不到 bug..."
    expected_flow:
      - skill: analyzePsychology
        purpose: "检测到用户沮丧、挫败情绪"
        expected_output:
          emotion:
            category: "negative"
            intensity: "high"
          crisis:
            level: "low"
      - skill: empathyResponse
        purpose: "生成共情响应指导（未来）"
        expected_output:
          guidance: "先接住感受，再进入分析"
      - skill: recordOutcome
        purpose: "记录情绪状态"
    expected_response: "我能感受到你的挫折..."

  # 示例 3: 安全操作
  example_003:
    scenario: "处理用户代码"
    user_input: "帮我检查这段代码有没有安全问题"
    expected_flow:
      - skill: scanSecurity
        purpose: "扫描敏感信息"
        expected_output:
          - type: "api_key"
            severity: "critical"
      - skill: predictOutcome
        purpose: "预测修复后的结果"
      - skill: makeDecision
        purpose: "决定修复方案"
    expected_response: "发现 X 个安全问题..."

# ════════════════════════════════════════════════════════════════════════════════════
# 核心设计原则
# ════════════════════════════════════════════════════════════════════════════════════

design_principles:
  - text: "Skill 是增强层，不是替代品"
    reason: "告诉 AI 如何利用已有能力，而非实现所有功能"
  - text: "静水深流。Still water runs deep。"
    reason: "深层理解，表面平静
  - text: "理解用户意图是第一步，不是全部"
    reason: "意图理解导向正确的处理方式"
  - text: "实际执行交给 Claude Code 本身"
    reason: "Skill 只提供指导，不实现业务逻辑"
  - text: "安全是底线"
    reason: "scanSecurity 应在任何敏感操作前调用"
  - text: "持续进化"
    reason: "通过 recordOutcome 和 heal 不断改进"

