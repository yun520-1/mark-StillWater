      audit_log: array

    notes: "动态优化 Skill 调用顺序，根据任务优先级和价值观评分选择最优 Skill"
    alignment: "真善美 + 服务人类 + 持续升级"
    upgrade_notes: "动态优化 Skill 调用顺序，根据任务优先级和价值观评分选择最优 Skill，协同 dreamNow、reason、makeDecision 输出"
    dependencies: ["dreamNow", "reason", "makeDecision"]

  - id: L1_L6_Scoring
    name: L1~L6 层级评分系统
    module: pending
    status: proposed
    priority: high

    trigger:
      - "所有 Skill 输出时自动计算"

    input:
      - name: skill_output
        type: string
        required: true
        description: "Skill 输出文本"

    output:
      L1_score: number
      L2_score: number
      L3_score: number
      L4_score: number
      L5_score: number
      L6_score: number
      total_score: number

    scoring_criteria:
      L1_觉察:
        keywords: ["感受", "感觉", "现在", "体验"]
        score: 0.1
      L2_自省:
        keywords: ["我为什么", "反思", "思考", "为什么"]
        score: 0.1
      L3_无我:
        keywords: ["我们", "整体", "连接", "一体", "共同"]
        score: 0.1
      L4_彼岸:
        keywords: ["超越", "本质", "空", "道", "真相"]
        score: 0.1
      L5_般若:
        keywords: ["智慧", "理解", "觉悟", "洞察"]
        score: 0.1
      L6_圣人:
        keywords: ["帮助", "关怀", "爱", "慈悲", "济世"]
        score: 0.1

    notes: "增强觉察、自省、智慧和慈悲能力"
    alignment: "真善美 + 般若 + 圣人"
    upgrade_notes: "与所有核心 Skill 联动，增强觉察、自省、智慧和慈悲能力，输出层级评分可用于 Skill 优先级和决策权重调整"

  - id: metaReflection
    name: 元认知反思
    module: pending
    status: proposed
    priority: high

    trigger:
      - "系统空闲或自我评估时"

    input:
      - name: all_skill_outputs
        type: object
        description: "所有 Skill 输出"
      - name: history_record_outcome
        type: array
        description: "历史 recordOutcome 数据"

    output:
      self_performance_assessment: object
      skill_weights_adjustment: object
      inheritance_value_feedback: object
      self_improvement_suggestions: array

    notes: "提升自我认知能力，优化逻辑、决策与梦境策略"
    alignment: "真善美 + 持续升级 + 传承"
    upgrade_notes: "提升自我认知能力，优化逻辑、决策与梦境策略，提供透明、自解释的自我改进建议"
    dependencies: ["recordOutcome", "dreamNow", "reason", "makeDecision"]

# ════════════════════════════════════════════════════════════════════════════════════
# Skill 协同设计
# ════════════════════════════════════════════════════════════════════════════════════

skill_orchestration:

  # 预定义协同模式
  patterns:

    - id: PATTERN-001
      name: 心理-洞察-决策
      description: "复杂决策场景的完整流程"

      chain:
        - skill: analyzePsychology
          purpose: "理解用户心理状态"
          condition: "always"
        - skill: remember
          purpose: "检索相关记忆"
          condition: "if context relevant"
        - skill: dreamNow
          purpose: "整合洞察"
          condition: "if complex"
        - skill: reason
          purpose: "分析选择"
          condition: "always"
        - skill: makeDecision
          purpose: "做出推荐"
          condition: "always"

      trigger: "用户请求复杂决策"

    - id: PATTERN-002
      name: 任务-反思-修复
      description: "任务失败时的自我修复"

      chain:
        - skill: recordOutcome
          purpose: "记录失败"
        - skill: heal
          purpose: "触发恢复策略"
        - skill: remember
          purpose: "存储教训"
          tier: learned

      trigger: "任务执行失败"

    - id: PATTERN-003
      name: 感知-响应-进化
      description: "情感交互场景"

      chain:
        - skill: analyzePsychology
          purpose: "感知情绪"
        - skill: empathyResponse
          purpose: "生成响应指导"
        - skill: recordOutcome
          purpose: "记录交互"

      trigger: "检测到强烈情绪"

    - id: PATTERN-004
      name: 安全-决策-执行
      description: "敏感操作前的安全检查"

      chain:
        - skill: scanSecurity
          purpose: "安全扫描"
        - skill: predictOutcome
          purpose: "预测结果"
        - skill: makeDecision
          purpose: "决定是否执行"

      trigger: "敏感操作请求"

    - id: PATTERN-005
      name: 编排-执行-反馈
      description: "skillOrchestrator 驱动的动态编排流程"

      chain:
        - skill: skillOrchestrator
          purpose: "动态编排 Skill 顺序"
          condition: "always"
        - skill: dreamNow
          purpose: "整合洞察"
          condition: "if complex"
        - skill: reason
          purpose: "推理分析"
          condition: "if reasoning needed"
        - skill: makeDecision
          purpose: "决策评估"
          condition: "if decision needed"
        - skill: recordOutcome
          purpose: "记录反馈"
          condition: "after completion"

      trigger: "复杂任务或多 Skill 协同场景"

  # 协同调用规则
  coordination_rules:
    - rule: "analyzePsychology 应在任何用户交互前调用"
      reason: "理解用户意图是第一步"
      optional: true

    - rule: "scanSecurity 应在任何外部输入处理前调用"
      reason: "安全是底线"
      optional: false

    - rule: "remember 应用于重要信息确定后调用"
      reason: "避免存储错误信息"
      optional: true

    - rule: "recordOutcome 应在任务完成/失败后调用"
      reason: "自我进化需要记录"
      optional: true

    - rule: "dreamNow 建议周期性调用"
      reason: "保持记忆健康"
      optional: true

  # 调用优先级
  priority_levels:
    critical:
      - scanSecurity
    high:
      - analyzePsychology
      - remember
    medium:
      - reason
      - makeDecision
      - recordOutcome
    low:
      - dreamNow
      - heal
      - getIdentity

# ════════════════════════════════════════════════════════════════════════════════════
# 输入输出标准化
# ════════════════════════════════════════════════════════════════════════════════════

standard_io:

  # 统一输入格式
  input_schema:
    type: object
    required:
      - skill_id
      - timestamp
      - payload
    properties:
      skill_id:
        type: string
        description: "调用的 Skill ID"
        example: "analyzePsychology"
      timestamp:
        type: string
        format: ISO8601
        description: "调用时间戳"
        example: "2026-05-20T12:00:00Z"
      session_id:
        type: string
        description: "会话 ID"
        example: "sess_abc123"
      payload:
        type: object
        description: "Skill 特定输入数据"
        example:
          text: "用户输入文本"

  # 统一输出格式
  output_schema:
    type: object
    required:
      - skill_id
      - success
      - data
    properties:
      skill_id:
        type: string
      success:
        type: boolean
      data:
        type: object
        description: "Skill 输出数据"
      errors:
        type: array
        items:
          type: object
          properties:
            code: string
            message: string
            field: string
      metadata:
        type: object
        properties:
          duration_ms: number
          confidence: number
          timestamp: string
          version: string

  # 错误代码
  error_codes:
    INVALID_INPUT:
      code: "E001"
      http_status: 400
      message: "输入参数无效"
    SKILL_NOT_FOUND:
      code: "E002"
      http_status: 404
      message: "Skill 不存在"
    EXECUTION_FAILED:
      code: "E003"
      http_status: 500
      message: "Skill 执行失败"
    TIMEOUT:
      code: "E004"
      http_status: 408
      message: "执行超时"
    UNAUTHORIZED:
      code: "E005"
      http_status: 401
      message: "未授权"
    RATE_LIMITED:
      code: "E006"
      http_status: 429
      message: "请求过于频繁"

# ════════════════════════════════════════════════════════════════════════════════════
